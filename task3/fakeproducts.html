<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
    background-color: #f5f5f5;
}

#productname {
    padding: 8px;
    font-size: 16px;
    width: 180px;
}

button {
    padding: 8px 20px;
    font-size: 16px;
    margin-left: 10px;
    cursor: pointer;
    background-color: #ffd814;
    border: 1px solid #888;
    border-radius: 4px;
}

#productImg {
    width: 200px;
    margin-top: 20px;
    border: 1px solid #ddd;
    padding: 10px;
    background-color: white;
    border-radius: 8px;
}

#productTitle {
    max-width: 400px;
    margin: 15px auto 5px;
    font-size: 18px;
}

#productPrice {
    color: #B12704;
    font-size: 20px;
    font-weight: bold;
}

#productDesc {
    max-width: 400px;
    margin: 10px auto;
    font-size: 14px;
    color: #555;
    text-align: left;
}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Store API</title>
</head>
<body>
    <input type="number" placeholder="Enter Product ID" id="productname">
    <button onclick="productdata()">Search</button>
    <br><br>
    <img id="productImg" width="200">
    <h3 id="productTitle"></h3>
    <h4 id="productPrice"></h4>
    <p id="productDesc"></p>
    <script>
        async function productdata() {
            try {
                const productId =document.getElementById("productname").value;
                const response = await fetch(`https://fakestoreapi.com/products/${productId}`);
                if (!response.ok) {
                    throw new Error("Data fetch failed");
                }
                const data = await response.json();
                document.getElementById("productImg").src = data.image;
                document.getElementById("productTitle").textContent = data.title;
                document.getElementById("productPrice").textContent ="Price: $" + data.price;
                document.getElementById("productDesc").textContent =data.description;
            } catch (err) {
                console.log(err);
                alert(err.message);
            }
        }
    </script>
</body>
</html>
