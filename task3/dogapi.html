<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

#dogname {
    padding: 8px;
    font-size: 16px;
    width: 180px;
}

button {
    padding: 8px 20px;
    font-size: 16px;
    margin-left: 10px;
    cursor: pointer;
}

#dogimg {
    display: block;
    margin: 20px auto;
    width: 200px;
    border: 2px solid black;
    border-radius: 8px;
}
</style>
</head>
<body>
     <input type="text" placeholder="Enter Breed" id="dogname">
      <button onclick="searchimg()">Search</button>
      <img id="dogimg" width="200">
      <script>
        async function searchimg(){
             try {
                const dogname =document.getElementById("dogname").value;
                const response = await fetch(`https://dog.ceo/api/breed/${dogname}/images/random`);
                if (!response.ok) {
                    throw new Error("Data fetch failed");
                }
                 const data = await response.json();
                document.getElementById("dogimg").src = data.message;
            }
            catch (err) {
                console.log(err);
                alert(err.message);
            }
        }
      </script>
</body>
</html>
